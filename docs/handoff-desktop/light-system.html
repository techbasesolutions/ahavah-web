<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=900,initial-scale=1" />
  <title>Ahavah — Light Mode Design System (handoff)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    html, body {
      margin: 0; padding: 0;
      background: var(--canvas);
      color: var(--ink);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    .container { max-width: 920px; margin: 0 auto; padding: 56px 24px 96px; }
    .container > h1 {
      margin: 0; font-size: 40px; font-weight: 800; letter-spacing: -0.025em;
      color: var(--ink);
    }
    .container > .sub {
      margin: 10px 0 32px; font-size: 16px; line-height: 1.55; color: var(--ink-2);
      max-width: 640px;
    }
    .artboard {
      width: 100%; height: 560px; margin-top: 24px;
      border-radius: 18px; overflow: hidden;
      border: 1px solid rgba(15,11,31,0.10);
      box-shadow: 0 10px 30px rgba(15,11,31,0.08);
    }
    .label {
      font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink-3); font-weight: 700; margin-top: 36px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ds.jsx"></script>

  <script type="text/babel" data-presets="react">
    (function() {
      const cards = [
        ["Brand mark",                window.BrandArtboard],
        ["Color palette",             window.ColorArtboard],
        ["Typography",                window.TypeArtboard],
        ["Buttons",                   window.ButtonArtboard],
        ["Pills · badges · cards",    window.ComponentsArtboard],
        ["Inputs · radii · shadows",  window.InputArtboard],
      ];
      function App() {
        return (
          <div className="container">
            <h1>Ahavah · Light Mode Design System</h1>
            <p className="sub">
              Tokens, components, and visual primitives for the desktop web build.
              Read together with <code>design-system.md</code> (full spec) and
              <code>tokens.css</code> (drop-in variables). Brand colors are immutable;
              only surfaces, ink, and chrome flip between themes.
            </p>
            {cards.map(([label, Comp]) => (
              <React.Fragment key={label}>
                <div className="label">{label}</div>
                <div className="artboard"><Comp /></div>
              </React.Fragment>
            ))}
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    })();
  </script>
</body>
</html>
